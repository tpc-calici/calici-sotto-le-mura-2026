<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="color-scheme" content="light only">
<meta name="theme-color" content="#0E4C86">
<title>Calici sotto le mura — Gestione Bottiglie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    color-scheme: light only;
    --wine:#6E1E3C;
    --wine-dark:#3E1024;
    --wine-light:#8C3157;
    --gold:#B9862E;
    --gold-light:#E4C77A;
    --brand-blue:#0E4C86;
    --brand-blue-dark:#0A3762;
    --cream:#EAF2FA;
    --paper:#FFFFFF;
    --charcoal:#2B2622;
    --muted:#8A7F74;
    --border:#DCE6F0;
    --green:#3B7A57;
    --green-bg:#E9F2EC;
    --red:#B23A2E;
    --red-bg:#FBEAE7;
    --amber-bg:#FBF2DF;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;color-scheme:light only;}
  body{
    font-family:'Inter',sans-serif;
    background:var(--cream);
    color:var(--charcoal);
    min-height:100vh;
    -webkit-tap-highlight-color:transparent;
  }
  h1,h2,h3,.display{font-family:'Fraunces',serif;}
  #app{min-height:100vh;display:flex;flex-direction:column;}
  button{font-family:inherit;cursor:pointer;}
  input,select{font-family:inherit;}
  .screen{flex:1;display:flex;flex-direction:column;padding:20px;max-width:640px;margin:0 auto;width:100%;}
  .screen.wide{max-width:1000px;}

  .vine-divider{display:flex;align-items:center;gap:6px;justify-content:center;margin:18px 0;opacity:.55;}
  .vine-divider span{width:5px;height:5px;border-radius:50%;background:var(--wine);}
  .vine-divider span:nth-child(2){background:var(--gold);width:7px;height:7px;}

  .home-hero{text-align:center;padding:56px 10px 28px;}
  .home-hero .eyebrow{letter-spacing:.14em;text-transform:uppercase;font-size:12px;color:var(--gold);font-weight:700;}
  .home-hero h1{font-size:36px;font-weight:700;margin:10px 0 6px;color:var(--wine-dark);}
  .home-hero p{color:var(--muted);font-size:15px;margin:0;}
  .home-cards{display:flex;flex-direction:column;gap:16px;padding:10px 4px 40px;}
  .home-card{
    background:var(--paper);border:1px solid var(--border);border-radius:var(--radius);
    padding:26px 22px;text-align:left;display:flex;align-items:center;gap:18px;
    box-shadow:0 2px 10px rgba(14,76,134,.07);transition:transform .15s ease;
  }
  .home-card:active{transform:scale(.98);}
  .home-card .icon{
    width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:26px;flex-shrink:0;
  }
  .home-card.casetta .icon{background:var(--wine);color:var(--gold-light);}
  .home-card.gestore .icon{background:var(--brand-blue);color:#fff;}
  .home-card .txt strong{display:block;font-family:'Fraunces',serif;font-size:19px;color:var(--charcoal);}
  .home-card .txt span{color:var(--muted);font-size:13px;}

  .field{margin-bottom:16px;}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px;}
  .field input, .field select{
    width:100%;padding:14px 15px;border-radius:12px;border:1.5px solid var(--border);
    font-size:16px;background:var(--paper);color:var(--charcoal);
  }
  .field input:focus, .field select:focus{outline:2px solid var(--wine-light);border-color:var(--wine-light);}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:15px 20px;border-radius:12px;border:none;font-weight:700;font-size:16px;width:100%;
  }
  .btn-primary{background:var(--wine);color:#fff;}
  .btn-primary:active{background:var(--wine-dark);}
  .btn-dark{background:var(--brand-blue);color:#fff;}
  .btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--charcoal);}
  .btn-sm{padding:9px 14px;font-size:13px;width:auto;border-radius:9px;}
  .btn-danger{background:var(--red);color:#fff;}
  .btn-ghost{background:transparent;color:var(--muted);border:none;font-size:13px;text-decoration:underline;padding:6px;width:auto;}
  .error-msg{background:var(--red-bg);color:var(--red);padding:10px 14px;border-radius:10px;font-size:14px;margin-bottom:14px;font-weight:600;}
  .info-msg{background:var(--amber-bg);color:#8A5A00;padding:10px 14px;border-radius:10px;font-size:13.5px;margin-bottom:14px;font-weight:600;}
  .back-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
  .back-link{color:var(--muted);font-size:14px;font-weight:600;background:none;border:none;padding:6px 0;}

  .topbar{
    display:flex;align-items:center;justify-content:space-between;padding:16px 20px;
    background:var(--wine);color:#fff;position:sticky;top:0;z-index:5;
  }
  .topbar.dark{background:var(--brand-blue-dark);}
  .topbar .tb-title{font-family:'Fraunces',serif;font-size:18px;font-weight:600;}
  .topbar .tb-sub{font-size:12px;opacity:.8;}
  .topbar button{background:rgba(255,255,255,.15);color:#fff;border:none;padding:8px 12px;border-radius:9px;font-size:12px;font-weight:600;}

  .cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:10px;}
  .cat-card{
    background:var(--paper);border:1px solid var(--border);border-radius:var(--radius);
    padding:28px 12px;text-align:center;font-weight:700;font-family:'Fraunces',serif;font-size:18px;
  }
  .cat-card .emoji{font-size:34px;display:block;margin-bottom:10px;}
  .cat-card.vino{color:var(--wine-dark);}
  .cat-card.birra{color:#8A5A00;}

  .casetta-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px;}
  .casetta-pick{
    background:var(--paper);border:1px solid var(--border);border-radius:12px;
    padding:16px 10px;text-align:center;font-weight:700;font-size:14.5px;
  }

  .content{padding:16px 16px 90px;flex:1;max-width:640px;margin:0 auto;width:100%;}
  .content.wide{max-width:1000px;}
  .product-card{
    background:var(--paper);border:1px solid var(--border);border-radius:14px;
    padding:16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;
  }
  .product-card .pname{font-family:'Fraunces',serif;font-size:17px;font-weight:600;color:var(--charcoal);margin:0 0 6px;}
  .product-card .stats{display:flex;gap:14px;font-size:12.5px;color:var(--muted);}
  .product-card .stats b{color:var(--charcoal);font-size:14px;}
  .stat-residue.low b{color:var(--red);}
  .stat-residue.ok b{color:var(--green);}
  .qty-btns{display:flex;gap:8px;flex-shrink:0;}
  .btn-qty{
    width:52px;height:44px;border-radius:11px;border:none;font-weight:800;font-size:16px;flex-shrink:0;
  }
  .btn-qty.plus{background:var(--wine);color:#fff;}
  .btn-qty.plus:active{background:var(--wine-dark);}
  .btn-qty.minus{background:var(--paper);color:var(--red);border:1.5px solid var(--red-bg);}
  .btn-qty.minus:disabled{color:var(--muted);border-color:var(--border);opacity:.5;}

  .modal-overlay{
    position:fixed;inset:0;background:rgba(30,20,15,.5);display:flex;align-items:center;justify-content:center;
    z-index:90;padding:24px;
  }
  .modal-box{
    background:var(--paper);border-radius:18px;padding:26px 22px 20px;max-width:300px;width:100%;text-align:center;
    box-shadow:0 12px 32px rgba(0,0,0,.25);
  }
  .modal-box p{font-family:'Fraunces',serif;font-size:18px;font-weight:600;color:var(--charcoal);margin:0 0 18px;}
  .modal-box button{width:100%;}

  .hint-subtitle{
    color:var(--muted);font-size:12.5px;text-align:center;margin:0 0 14px;line-height:1.4;
  }
  .coupon-link{
    display:block;text-align:center;color:var(--muted);font-size:13px;margin-top:8px;
    text-decoration:underline;background:none;border:none;padding:10px;width:100%;
  }

  .menu-list{display:flex;flex-direction:column;gap:14px;padding-top:6px;}
  .menu-card{
    background:var(--paper);border:1px solid var(--border);border-radius:14px;
    padding:20px;text-align:left;display:flex;align-items:center;gap:16px;
  }
  .menu-card .icon{width:46px;height:46px;border-radius:50%;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
  .menu-card strong{display:block;font-family:'Fraunces',serif;font-size:17px;color:var(--charcoal);}
  .menu-card span{color:var(--muted);font-size:12.5px;}

  .section-title{font-family:'Fraunces',serif;font-size:20px;margin:6px 0 14px;color:var(--wine-dark);}
  .card{background:var(--paper);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;}
  .casetta-block-title{font-weight:700;font-size:14px;color:var(--wine-dark);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
  .prod-edit-row{display:flex;gap:6px;align-items:center;margin-bottom:8px;}
  .prod-edit-row .prod-name-input{flex:1 1 auto;min-width:0;padding:9px 8px;border-radius:8px;border:1px solid var(--border);font-size:13.5px;}
  .prod-edit-row .prod-cost-input{width:46px;flex:none;padding:9px 4px;border-radius:8px;border:1px solid var(--border);font-size:13px;text-align:center;}
  .prod-edit-row .prod-coupon-input{width:46px;flex:none;padding:9px 4px;border-radius:8px;border:1px solid var(--border);font-size:13px;text-align:center;}
  .prod-header-row{display:flex;gap:6px;align-items:center;margin-bottom:4px;}
  .prod-header-row .prod-header-name{flex:1 1 auto;min-width:0;}
  .prod-header-row .prod-header-mini{width:46px;flex:none;text-align:center;font-size:9.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.02em;}
  .prod-header-row .prod-header-spacer{width:32px;flex:none;}
  .icon-btn{background:var(--red-bg);color:var(--red);border:none;border-radius:8px;width:32px;height:32px;flex:none;font-weight:700;flex-shrink:0;padding:0;}
  .add-prod-btn{background:var(--green-bg);color:var(--green);border:none;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:700;}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--border);}
  th{color:var(--muted);font-weight:700;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;}
  .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
  .badge.vino{background:#F3E3EA;color:var(--wine-dark);}
  .badge.birra{background:#FBF0D9;color:#8A5A00;}
  .filters{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  .filters select{
    width:100%;max-width:100%;min-width:0;box-sizing:border-box;
    padding:9px 10px;border-radius:9px;border:1px solid var(--border);font-size:13px;background:#fff;
    text-overflow:ellipsis;overflow:hidden;white-space:nowrap;
  }
  .load-input-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);gap:10px;}
  .load-input-row .lbl{flex:1;}
  .load-input-row .lbl .already{display:block;font-size:11.5px;color:var(--muted);}
  .load-input-row input{width:80px;padding:9px;border-radius:8px;border:1px solid var(--border);font-size:15px;text-align:center;}
  .empty-note{color:var(--muted);font-size:13.5px;text-align:center;padding:30px 10px;}
  .ricarica-tag{background:var(--gold);color:#fff;font-size:10.5px;padding:2px 8px;border-radius:20px;margin-left:8px;font-weight:700;}
  .summary-strip{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .summary-grid-2x2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .summary-grid-2x2 .box{
    background:var(--paper);border:1px solid var(--border);border-radius:14px;
    padding:10px 14px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  }
  .summary-grid-2x2 .box.box-wide{grid-column:1 / -1;}
  .summary-grid-2x2 .box span{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:700;}
  .summary-grid-2x2 .box b{font-size:30px;font-family:'Fraunces',serif;color:var(--wine-dark);line-height:1;}
  .summary-strip .box{flex:1;min-width:100px;background:var(--paper);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;}
  .summary-strip .box b{display:block;font-size:22px;font-family:'Fraunces',serif;color:var(--wine-dark);}
  .summary-strip .box span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
  .loading-full{display:flex;align-items:center;justify-content:center;min-height:100vh;color:var(--muted);font-size:14px;text-align:center;padding:30px;}
  .lowstock-box{background:var(--red-bg);border:1px solid #E9B9AF;border-radius:14px;padding:16px;margin-bottom:18px;}
  .lowstock-box h3{margin:0 0 10px;font-size:14.5px;color:var(--red);font-family:'Fraunces',serif;}
  .lowstock-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed #E9B9AF;font-size:13.5px;}
  .lowstock-row:last-child{border-bottom:none;}
  .lowstock-row b{color:var(--red);}
  .setup-box{background:var(--paper);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:520px;margin:40px auto;}
  .setup-box h2{color:var(--wine-dark);margin-top:0;}
  .setup-box code{background:var(--cream);padding:2px 6px;border-radius:6px;font-size:13px;}

  .hist-mode-row{display:flex;gap:10px;margin-bottom:16px;}
  .hist-mode-btn{
    flex:1;padding:12px;border-radius:11px;border:1.5px solid var(--border);background:var(--paper);
    font-weight:700;font-size:13.5px;color:var(--muted);
  }
  .hist-mode-btn.active{background:var(--brand-blue);border-color:var(--brand-blue);color:#fff;}
  .bar-row{display:flex;align-items:center;gap:10px;padding:7px 0;}
  .bar-label{width:104px;flex-shrink:0;font-size:12px;color:var(--charcoal);line-height:1.2;}
  .bar-track{flex:1;background:var(--cream);border-radius:7px;height:20px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:7px;transition:width .3s ease;}
  .bar-fill.vino{background:var(--wine);}
  .bar-fill.birra{background:var(--gold);}
  .bar-value{width:32px;text-align:right;font-weight:700;font-size:13px;flex-shrink:0;}
</style>
</head>
<body>
<div id="app"><div class="loading-full">Caricamento…</div></div>

<script>
/* =========================================================================
   CONFIGURAZIONE BASE
   ========================================================================= */
const EVENT_NAME = "Calici sotto le mura";
const PW_CASETTA = "Calici";
const PW_GESTORE = "Peggiori";
const SESSION_HOURS = 8;
const DEFAULT_PRODUCTS_PER_CASETTA = 5;

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwCOWQwGJlaJKY_wkam-B3OAPLDqiwl8mbHewMRUn8G_NLzzF5kbmW10DTFmgajb8CH/exec";

const VINO_NAMES = ['Vignalta','Cà Rovere','Assetati','Carezze','Ongaresca','Rossi','Bolle','Bianchi','Rosè'];
const BIRRA_NAMES = ['Nebula','Busa dei briganti'];

const DAYS = [
  { id:'w1v', date:'2026-07-24', label:'Venerdì 24/07 — Weekend 1',  ricarica:false },
  { id:'w1s', date:'2026-07-25', label:'Sabato 25/07 — Weekend 1',   ricarica:false },
  { id:'w1d', date:'2026-07-26', label:'Domenica 26/07 — Weekend 1', ricarica:false },
  { id:'w2v', date:'2026-07-31', label:'Venerdì 31/07 — Weekend 2',  ricarica:true  },
  { id:'w2s', date:'2026-08-01', label:'Sabato 01/08 — Weekend 2',   ricarica:false },
  { id:'w2d', date:'2026-08-02', label:'Domenica 02/08 — Weekend 2', ricarica:false },
];
function dayWindow(day){
  const parts = day.date.split('-').map(Number);
  const start = new Date(parts[0], parts[1]-1, parts[2], 18, 0, 0, 0);
  const end   = new Date(parts[0], parts[1]-1, parts[2], 27, 0, 0, 0);
  return { start: start, end: end };
}
function getDayIdForTimestamp(ts){
  for(let i=0;i<DAYS.length;i++){
    const day = DAYS[i];
    const w = dayWindow(day);
    if(ts >= w.start.getTime() && ts < w.end.getTime()) return day.id;
  }
  return null;
}
function getDayIdsForGroup(groupId){
  if(groupId === 'weekend1') return ['w1v','w1s','w1d'];
  if(groupId === 'weekend2') return ['w2v','w2s','w2d'];
  if(groupId === 'totale') return DAYS.map(function(d){ return d.id; });
  return [groupId];
}
function groupLabel(groupId){
  if(groupId === 'weekend1') return 'Weekend 1 — Totale';
  if(groupId === 'weekend2') return 'Weekend 2 — Totale';
  if(groupId === 'totale') return 'Totale Evento';
  const d = DAYS.find(function(x){ return x.id===groupId; });
  return d ? d.label : groupId;
}

/* =========================================================================
   STORAGE LAYER — Google Apps Script (nessun account richiesto)
   ========================================================================= */
function wait(ms){ return new Promise(function(res){ setTimeout(res, ms); }); }
function storageConfigured(){ return APPS_SCRIPT_URL && APPS_SCRIPT_URL.indexOf('INSERISCI_QUI') === -1; }

const STOREGET_FETCH_FAILED = Symbol('fetch-failed');
async function storeGet(key){
  if(!storageConfigured()) return null;
  const attempts = 3;
  for(let i=0; i<attempts; i++){
    try{
      const res = await fetch(APPS_SCRIPT_URL + '?key=' + encodeURIComponent(key));
      const data = await res.json();
      return (data && data.value != null) ? data.value : null; // risposta valida dal server (anche se vuota)
    }catch(e){
      console.error('storeGet error (tentativo '+(i+1)+'/'+attempts+')', e);
      if(i<attempts-1) await wait(500*(i+1));
    }
  }
  return STOREGET_FETCH_FAILED; // tutti i tentativi falliti per problemi di rete: NON sappiamo lo stato reale
}
const saveQueues = {};
function storeSet(key, value){
  if(!storageConfigured()) return Promise.resolve();
  const prev = saveQueues[key] || Promise.resolve();
  const next = prev.then(function(){ return doStoreSet(key, value); });
  saveQueues[key] = next;
  return next;
}
async function doStoreSet(key, value){
  const attempts = 3;
  for(let i=0;i<attempts;i++){
    try{
      await fetch(APPS_SCRIPT_URL, { method:'POST', body: JSON.stringify({action:'set', key:key, value:value}) });
      return;
    }catch(e){
      console.error('storeSet error (tentativo '+(i+1)+'/'+attempts+')', e);
      if(i<attempts-1) await wait(500*(i+1));
    }
  }
}

function getLocalSession(){
  try{ const raw = localStorage.getItem('cb_session_casetta'); return raw ? JSON.parse(raw) : null; }
  catch(e){ return null; }
}
function saveLocalSession(s){ try{ localStorage.setItem('cb_session_casetta', JSON.stringify(s)); }catch(e){} }
function clearLocalSession(){ try{ localStorage.removeItem('cb_session_casetta'); }catch(e){} }

function defaultConfig(){
  function mk(prefix, names){
    return names.map(function(name, i){
      return {
        id: prefix+(i+1),
        name: name,
        products: Array.from({length:DEFAULT_PRODUCTS_PER_CASETTA}, function(_,j){
          return { id: prefix+(i+1)+'_p'+(j+1), name: (prefix==='v' ? 'Vino ' : 'Birra ') + (j+1) };
        })
      };
    });
  }
  return { vino: mk('v', VINO_NAMES), birra: mk('b', BIRRA_NAMES) };
}

async function getConfig(){
  const raw = await storeGet('config');
  if(raw === STOREGET_FETCH_FAILED){
    // Non siamo riusciti a contattare il server: NON creiamo/sovrascriviamo nulla.
    // Usiamo quello che abbiamo già in memoria, se c'è, altrimenti dei default solo temporanei (non salvati).
    return state.config || defaultConfig();
  }
  if(raw){ try{ return JSON.parse(raw); }catch(e){} }
  // Il server ha risposto correttamente e la chiave non esiste: è la primissima inizializzazione.
  const def = defaultConfig();
  await storeSet('config', JSON.stringify(def));
  return def;
}
async function saveConfig(cfg){ await storeSet('config', JSON.stringify(cfg)); }

async function getLoads(){
  const raw = await storeGet('loads');
  if(raw === STOREGET_FETCH_FAILED) return state.loads || {};
  if(raw){ try{ return JSON.parse(raw); }catch(e){} }
  return {};
}
async function saveLoads(loads){ await storeSet('loads', JSON.stringify(loads)); }

async function getLoadsLog(){
  const raw = await storeGet('loadsLog');
  if(raw === STOREGET_FETCH_FAILED) return state.loadsLog || [];
  if(raw){ try{ return JSON.parse(raw); }catch(e){} }
  return [];
}
async function saveLoadsLog(l){ await storeSet('loadsLog', JSON.stringify(l)); }

async function getLog(){
  const raw = await storeGet('log');
  if(raw === STOREGET_FETCH_FAILED) return state.log || [];
  if(raw){ try{ return JSON.parse(raw); }catch(e){} }
  return [];
}
async function saveLog(log){ await storeSet('log', JSON.stringify(log)); }

async function getCoupons(){
  const raw = await storeGet('coupons');
  if(raw === STOREGET_FETCH_FAILED) return state.coupons || {};
  if(raw){ try{ return JSON.parse(raw); }catch(e){} }

}

function findCasetta(categoria, casettaId){
  return (state.config[categoria]||[]).find(function(c){ return c.id===casettaId; });
}
function allCasette(){
  return state.config.vino.map(function(c){ return Object.assign({}, c, {categoria:'vino'}); })
    .concat(state.config.birra.map(function(c){ return Object.assign({}, c, {categoria:'birra'}); }));
}
function unitFor(categoria){
  return categoria === 'birra'
    ? { sing:'fusto', plur:'fusti', adj:'finito', btn:'Segna fusto finito', loadedLabel:'caricati', finishedLabel:'finiti', soldLabel:'venduti' }
    : { sing:'bottiglia', plur:'bottiglie', adj:'finita', btn:'Segna bottiglia finita', loadedLabel:'caricate', finishedLabel:'finite', soldLabel:'vendute' };
}
function totalLoaded(casettaId, productId){
  let total = 0;
  const byDay = state.loads[casettaId] || {};
  Object.keys(byDay).forEach(function(dayId){
    const v = byDay[dayId] && byDay[dayId][productId];
    if(typeof v === 'number') total += v;
  });
  return total;
}
function totalFinished(casettaId, productId){
  return state.log.filter(function(l){ return l.casettaId===casettaId && l.productId===productId; }).length;
}
function fmtDateTime(ts){
  const d = new Date(ts);
  return d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'}) + ' · ' + d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
}
function escapeHtml(s){
  return String(s==null?'':s).replace(/[&<>"']/g, function(c){
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
  });
}
function escapeAttr(s){ return escapeHtml(s); }

   ========================================================================= */
const app = document.getElementById('app');

function render(){
  if(!storageConfigured()){
    app.innerHTML = renderSetupNeeded();
    return;
  }
  let html = '';
  switch(state.screen){
    case 'loading': html = '<div class="loading-full">Caricamento…</div>'; break;
    case 'home': html = renderHome(); break;
    case 'casetta_login': html = renderCasettaLogin(); break;
    case 'casetta_category': html = renderCasettaCategory(); break;
    case 'casetta_select': html = renderCasettaSelect(); break;
    case 'casetta_view': html = renderCasettaView(); break;
    case 'casetta_log': html = renderCasettaLog(); break;
    case 'gestore_login': html = renderGestoreLogin(); break;
    case 'gestore_menu': html = renderGestoreMenu(); break;
    case 'gestore_config': html = wrapGestoreSection('🏷️ Casette & Prodotti', renderGestoreConfig()); break;
    case 'gestore_carico': html = wrapGestoreSection('🧾 Carico Giornaliero', renderGestoreCarico()); break;
    case 'gestore_giorno': html = wrapGestoreSection('📊 Vendite', renderGestoreVenditeGiorno()); break;
    case 'gestore_riepilogo': html = wrapGestoreSection('📦 Scorte', renderGestoreRiepilogo()); break;
    case 'gestore_istogrammi': html = wrapGestoreSection('📈 Istogrammi', renderGestoreIstogrammi()); break;
    case 'gestore_coupon': html = wrapGestoreSection('🎟️ Coupon', renderGestoreCoupon()); break;
    case 'gestore_log': html = wrapGestoreSection('📜 Registro', renderGestoreLog()); break;
    case 'gestore_demo': html = wrapGestoreSection('🧪 Dati di Prova', renderGestoreDemo()); break;
    default: html = '<div class="loading-full">Schermata non trovata</div>';
  }
  if(state.ui.autoModalMessage){
    html += `<div class="modal-overlay"><div class="modal-box">
      <p style="margin-bottom:0;">${escapeHtml(state.ui.autoModalMessage)}</p>
    </div></div>`;
  }
  if(state.ui.popupMessage){
    html += `<div class="modal-overlay"><div class="modal-box">
      <p>${escapeHtml(state.ui.popupMessage)}</p>
      <button class="btn btn-primary" data-action="close-popup">OK</button>
    </div></div>`;
  }
  app.innerHTML = html;
}

function showAutoModal(msg){
  state.ui.autoModalMessage = msg;
  clearTimeout(window.__autoModalTimer);
  window.__autoModalTimer = setTimeout(function(){
    state.ui.autoModalMessage = null;
    render();
  }, 2000);
}

function renderCasettaView(){
  const s = state.casettaSession;
  const casetta = findCasetta(s.categoria, s.casettaId);
  if(!casetta){
    return `<div class="screen"><p>Casetta non trovata. <button class="btn btn-outline" data-action="logout-casetta">Torna al login</button></p></div>`;
  }
  const icon = s.categoria==='vino' ? '🍷' : '🍺';
  const rows = casetta.products.map(function(p){
    const loaded = totalLoaded(casetta.id, p.id);
    const finished = totalFinished(casetta.id, p.id);
    const residue = loaded - finished;
    const residueClass = loaded===0 ? '' : (residue<=2 ? 'low' : 'ok');
    return `
    <div class="product-card">
      <div>
        <p class="pname">${escapeHtml(p.name)} - ${p.coupons!=null && p.coupons!=='' ? p.coupons : 0} coupon</p>
        <div class="stats">
          <span>Finiti&nbsp;<b>${finished}</b></span>
          <span class="stat-residue ${residueClass}">Residui&nbsp;<b>${loaded===0 ? '—' : residue}</b></span>
        </div>
      </div>
      <div class="qty-btns">
        <button class="btn-qty plus" data-action="increment-finish" data-pid="${p.id}">+1</button>
        <button class="btn-qty minus" data-action="decrement-finish" data-pid="${p.id}" ${finished<=0?'disabled':''}>−1</button>
      </div>
    </div>
    `;
  }).join('');

  return `
  <div class="topbar">
    <div>
      <div class="tb-title">${icon} ${escapeHtml(casetta.name)}</div>
      <div class="tb-sub">${escapeHtml(s.name)}</div>
    </div>
    <div style="display:flex;gap:8px;">
      <button data-action="manual-refresh" title="Aggiorna">🔄</button>
      <button data-action="logout-casetta">Esci</button>
    </div>
  </div>
  <div class="content">
    <p class="hint-subtitle">Clicca +1 se devi inserire una bottiglia finita. Clicca -1 se devi annullare un inserimento sbagliato.</p>

  </div>`;
}

function renderGestoreVenditeGiorno(){
  const groupId = state.ui.giornoGroupId;
  const dayIds = getDayIdsForGroup(groupId);
  const singleDay = dayIds.length===1 ? DAYS.find(function(d){ return d.id===dayIds[0]; }) : null;

  const entries = state.log.filter(function(l){ return dayIds.indexOf(getDayIdForTimestamp(l.ts)) !== -1; });
  const totalBottiglie = entries.filter(function(e){ return e.categoria==='vino'; }).length;
  const totalFusti = entries.filter(function(e){ return e.categoria==='birra'; }).length;
  let couponTotal = 0;
  allCasette().forEach(function(c){
    dayIds.forEach(function(dId){
      const e = state.coupons[c.id] && state.coupons[c.id][dId];
      if(e) couponTotal += e.count;
    });
  });

  const costMap = {};
  allCasette().forEach(function(c){
    c.products.forEach(function(p){ costMap[p.id] = parseFloat(p.cost) || 0; });
  });
  const totalCost = entries.reduce(function(sum,e){ return sum + (costMap[e.productId] || 0); }, 0);

  function block(categoria, label){
    const u = unitFor(categoria);
    const cs = state.config[categoria];
    const rows = cs.map(function(c){
      const prodRows = c.products.map(function(p){
        const count = entries.filter(function(e){ return e.casettaId===c.id && e.productId===p.id; }).length;
        return count>0 ? `<tr><td>${escapeHtml(p.name)}</td><td>${count}</td></tr>` : '';
      }).join('');
      const casettaTotal = c.products.reduce(function(sum,p){
        return sum + entries.filter(function(e){ return e.casettaId===c.id && e.productId===p.id; }).length;
      }, 0);
      const casettaCost = c.products.reduce(function(sum,p){
        const sold = entries.filter(function(e){ return e.casettaId===c.id && e.productId===p.id; }).length;
        return sum + sold * (costMap[p.id] || 0);
      }, 0);
      const casettaCoupons = dayIds.reduce(function(sum,dId){
        const e = state.coupons[c.id] && state.coupons[c.id][dId];
        return sum + (e ? e.count : 0);
      }, 0);
      if(casettaTotal===0){
        return `<div class="card">
          <div class="casetta-block-title"><span>${escapeHtml(c.name)}</span><span style="color:var(--muted);">0 ${u.plur}</span></div>
          ${casettaCoupons>0 ? `<div style="font-size:12.5px;color:var(--muted);">🎟️ ${casettaCoupons} coupon</div>` : ''}
        </div>`;
      }
      const casettaSaldo = casettaCoupons - Math.round(casettaCost);
      return `<div class="card">
        <div class="casetta-block-title"><span>${escapeHtml(c.name)}</span><span style="font-weight:700;">${casettaTotal} ${u.plur}</span></div>

          <span>⚖️ Saldo: <b style="color:${casettaSaldo>=0?'var(--green)':'var(--red)'};">${casettaSaldo>=0?'+':''}${casettaSaldo}</b></span>

    }).join('');

  return `

          ${DAYS.map(function(d){ return `<option value="${d.id}" ${d.id===groupId?'selected':''}>${d.label}${d.ricarica?' (ricarica)':''}</option>`; }).join('')}

      <div class="box"><span>Coupon venduti</span><b>${couponTotal}</b></div>
      <div class="box box-wide"><span>Saldo (coupon − costo)</span><b style="color:${(couponTotal-Math.round(totalCost))>=0?'var(--green)':'var(--red)'};">${(couponTotal-Math.round(totalCost))>=0?'+':''}${couponTotal-Math.round(totalCost)}</b></div>
    </div>
    ${block('vino','🍷 Vino')}
    ${block('birra','🍺 Birra')}
  `;
}

function renderGestoreRiepilogo(){
  const lowStock = [];
  state.config.vino.forEach(function(c){
    c.products.forEach(function(p){
      const loaded = totalLoaded(c.id, p.id);
      if(loaded<=0) return;
      const finished = totalFinished(c.id, p.id);
      lowStock.push({ casettaName:c.name, productName:p.name, residue: loaded-finished });
    });
  });
  lowStock.sort(function(a,b){ return a.residue-b.residue; });
  const top5 = lowStock.slice(0,5);

  const lowStockHtml = top5.length ? `
    <div class="lowstock-box">
      <h3>⚠️ Vini con meno scorte</h3>
      ${top5.map(function(r){ return `<div class="lowstock-row"><span>${escapeHtml(r.casettaName)} — ${escapeHtml(r.productName)}</span><b>${r.residue}</b></div>`; }).join('')}
    </div>` : '';

  function block(categoria, label){
    const u = unitFor(categoria);
    const rows = state.config[categoria].map(function(c){
      const prodRows = c.products.map(function(p){
        const loaded = totalLoaded(c.id, p.id);
        const finished = totalFinished(c.id, p.id);
        const residue = loaded - finished;
        return `<tr>
          <td>${escapeHtml(p.name)}</td>
          <td>${loaded}</td>
          <td>${finished}</td>
          <td style="font-weight:700;color:${residue<=2 ? 'var(--red)':'var(--green)'}">${residue}</td>
        </tr>`;
      }).join('');
      return `<div class="card">
        <div class="casetta-block-title"><span>${escapeHtml(c.name)}</span></div>
        <table>
          <thead><tr><th>Prodotto</th><th>${u.plur.charAt(0).toUpperCase()+u.plur.slice(1)} ${u.loadedLabel}</th><th>${u.plur.charAt(0).toUpperCase()+u.plur.slice(1)} ${u.finishedLabel}</th><th>Residui</th></tr></thead>
          <tbody>${prodRows}</tbody>
        </table>
      </div>`;
    }).join('');
    return `<h3 class="section-title" style="font-size:16px;">${label}</h3>${rows}`;
  }

  return `
    ${lowStockHtml}
    ${block('vino','🍷 Vino')}
    ${block('birra','🍺 Birra')}
  `;
}

function renderBarChart(items, categoria){
  if(!items.length) return `<p class="empty-note">Nessun dato da mostrare.</p>`;
  const max = Math.max.apply(null, items.map(function(it){ return it.value; }).concat([1]));
  return items.map(function(it){
    const pct = Math.round((it.value / max) * 100);
    return `<div class="bar-row">
      <span class="bar-label">${escapeHtml(it.label)}</span>
      <div class="bar-track"><div class="bar-fill ${categoria}" style="width:${pct}%"></div></div>
      <span class="bar-value">${it.value}</span>
    </div>`;
  }).join('');
}

async function handleAction(action, target){
  const ui = state.ui;
  switch(action){
    case 'go-home': state.screen='home'; ui.loginError=''; render(); break;

    case 'go-casetta-login': state.screen='casetta_login'; ui.loginError=''; render(); break;
    case 'submit-casetta-login': {
      const pw = document.getElementById('input-casetta-pw').value;
      const name = document.getElementById('input-casetta-name').value.trim();
      if(pw !== PW_CASETTA){ ui.loginError = 'Password errata.'; render(); return; }
      if(!name){ ui.loginError = 'Inserisci il tuo nome.'; render(); return; }
      ui.loginError=''; ui.tempName = name;
      state.screen='casetta_category'; render();
      break;
    }
    case 'go-casetta-category': state.screen='casetta_category'; render(); break;
    case 'pick-cat': {
      ui.catChoice = target.dataset.cat;
      state.screen = 'casetta_select'; render();
      break;
    }
    case 'pick-casetta': {
      const casettaId = target.dataset.id;
      const session = { name: ui.tempName, categoria: ui.catChoice, casettaId: casettaId, loginTs: Date.now() };
      state.casettaSession = session;
      saveLocalSession(session);
      state.screen = 'casetta_view'; render();
      break;
    }
    case 'increment-finish': {
      const pid = target.dataset.pid;
      const s = state.casettaSession;
      const casetta = findCasetta(s.categoria, s.casettaId);
      const product = casetta.products.find(function(p){ return p.id===pid; });
      state.log.push({
        id: 'e'+Date.now()+Math.random().toString(36).slice(2,7),
        categoria: s.categoria, casettaId: casetta.id, casettaName: casetta.name,
        productId: pid, productName: product.name, person: s.name, ts: Date.now()
      });
      await saveLog(state.log);
      showAutoModal(s.categoria === 'birra' ? 'Fusto inserito' : 'Bottiglia inserita');
      render();
      break;
    }
    case 'decrement-finish': {
      const pid = target.dataset.pid;
      const s = state.casettaSession;
      const casetta = findCasetta(s.categoria, s.casettaId);
      let idxToRemove = -1;
      for(let i=state.log.length-1; i>=0; i--){
        if(state.log[i].casettaId===casetta.id && state.log[i].productId===pid){ idxToRemove = i; break; }
      }
      if(idxToRemove !== -1){
        state.log.splice(idxToRemove, 1);
        await saveLog(state.log);
        ui.popupMessage = 'Annulla inserimento';
      }
      render();
      break;
    }
    case 'close-popup': ui.popupMessage = null; render(); break;
    case 'go-casetta-log': state.screen='casetta_log'; render(); break;
    case 'go-casetta-view-back': state.screen='casetta_view'; render(); break;
    case 'logout-casetta': {
      clearLocalSession();
      state.casettaSession = null;
      state.screen = 'home';
      render();
      break;
    }

    case 'go-gestore-login': state.screen='gestore_login'; ui.loginError=''; render(); break;
    case 'submit-gestore-login': {
      const pw = document.getElementById('input-gestore-pw').value;
      if(pw !== PW_GESTORE){ ui.loginError = 'Password errata.'; render(); return; }
      ui.loginError='';
      state.gestoreAuthed = true;
      state.screen = 'gestore_menu';
      render();
      break;
    }
    case 'logout-gestore': state.gestoreAuthed=false; state.screen='home'; render(); break;
    case 'go-gestore-menu': state.screen='gestore_menu'; render(); break;
    case 'go-gestore-section': state.screen = 'gestore_' + target.dataset.section; render(); break;
    case 'set-hist-mode': ui.histMode = target.dataset.mode; render(); break;
    case 'manual-refresh': await refreshSharedData(true); break;

    case 'ask-delete-log': ui.confirmDeleteLogId = target.dataset.id; render(); break;
    case 'cancel-delete-log': ui.confirmDeleteLogId = null; render(); break;
    case 'confirm-delete-log': {
      const idToDelete = target.dataset.id;
      state.log = state.log.filter(function(e){ return e.id !== idToDelete; });
      await saveLog(state.log);
      ui.confirmDeleteLogId = null;
      render();
      break;
    }

    case 'ask-generate-simulation': ui.confirmDemoAction = 'generate'; render(); break;
    case 'ask-reset-data': ui.confirmDemoAction = 'reset'; render(); break;
    case 'cancel-demo-action': ui.confirmDemoAction = null; render(); break;
    case 'do-generate-simulation': {
      await generateSimulation();
      ui.confirmDemoAction = null;
      render();
      break;
    }
    case 'do-reset-data': {
      await resetEventData();
      ui.confirmDemoAction = null;
      render();
      break;
    }

    case 'gestore-save-coupon': {
      const nameVal = document.getElementById('coupon-add-casetta-search').value.trim().toLowerCase();
      const dayId = document.getElementById('coupon-add-day-select').value;
      const countVal = parseInt(document.getElementById('coupon-add-count-input').value, 10);
      const casetta = allCasette().find(function(c){ return c.name.trim().toLowerCase() === nameVal; });
      if(!nameVal || !casetta){
        ui.couponAddError = 'Casetta non trovata: controlla il nome inserito.';
        render();
        return;
      }
      if(isNaN(countVal) || countVal < 0){
        ui.couponAddError = 'Inserisci un numero di coupon valido.';
        render();
        return;
      }
      ui.couponAddError = '';
      if(!state.coupons[casetta.id]) state.coupons[casetta.id] = {};
      state.coupons[casetta.id][dayId] = { count: countVal, person: 'Gestore', ts: Date.now() };
      await saveCoupons(state.coupons);
      render();
      break;
    }

    case 'add-product': {
      const cat = target.dataset.cat, cid = target.dataset.cid;
      const casetta = state.config[cat].find(function(c){ return c.id===cid; });
      const newId = cid+'_p'+(Date.now()%100000);
      casetta.products.push({ id:newId, name:'Nuovo prodotto', cost:0, coupons:0 });
      await saveConfig(state.config);
      render();
      break;
    }
    case 'remove-product': {
      const cat = target.dataset.cat, cid = target.dataset.cid, pid = target.dataset.pid;
      const casetta = state.config[cat].find(function(c){ return c.id===cid; });
      casetta.products = casetta.products.filter(function(p){ return p.id!==pid; });
      await saveConfig(state.config);
      render();
      break;
    }
    case 'add-load': {
      const cid = target.dataset.cid, dayId = target.dataset.day;
      const casetta = allCasette().find(function(c){ return c.id===cid; });
      if(!state.loads[cid]) state.loads[cid] = {};
      if(!state.loads[cid][dayId]) state.loads[cid][dayId] = {};
      let anyAdded = false;
      casetta.products.forEach(function(p){
        const el = document.getElementById('load-add-'+p.id);
        const val = parseInt(el.value, 10);
        if(!isNaN(val) && val > 0){
          state.loads[cid][dayId][p.id] = (state.loads[cid][dayId][p.id] || 0) + val;
          state.loadsLog.push({
            id: 'l'+Date.now()+Math.random().toString(36).slice(2,6),
            casettaId: cid, casettaName: casetta.name, categoria: casetta.categoria,
            dayId: dayId, productId: p.id, productName: p.name, qty: val, ts: Date.now()
          });
          anyAdded = true;
        }
      });
      if(anyAdded){
        await saveLoads(state.loads);
        await saveLoadsLog(state.loadsLog);
      }
      render();
      break;
    }
  }
}

function handleChangeAction(target){
  const ui = state.ui;
  if(target.id === 'load-casetta-select'){ ui.loadCasettaId = target.value; render(); }
  else if(target.id === 'load-day-select'){ ui.loadDayId = target.value; render(); }
  else if(target.id === 'giorno-day-select'){ ui.giornoGroupId = target.value; render(); }
  else if(target.id === 'hist-casetta-select'){ ui.histCasettaId = target.value; ui.histProductId = 'all'; render(); }
  else if(target.id === 'hist-product-select'){ ui.histProductId = target.value; render(); }
  else if(target.id === 'hist-day-select'){ ui.histGroupId = target.value; render(); }
  else if(target.id === 'log-filter-cat'){ ui.logFilterCat = target.value; ui.logFilterCasetta='all'; ui.logFilterProduct='all'; render(); }
  else if(target.id === 'log-filter-casetta'){ ui.logFilterCasetta = target.value; ui.logFilterProduct='all'; render(); }
  else if(target.id === 'log-filter-product'){ ui.logFilterProduct = target.value; render(); }
  else if(target.id === 'log-filter-day'){ ui.logFilterDay = target.value; render(); }
}

async function handleBlurEdit(target){
  const action = target.dataset.action;
  if(action === 'edit-casetta-name'){
    const cat = target.dataset.cat, id = target.dataset.id;
    const casetta = state.config[cat].find(function(c){ return c.id===id; });
    casetta.name = target.value.trim() || casetta.name;
    await saveConfig(state.config);
  }
  if(action === 'edit-product-name'){
    const cat = target.dataset.cat, cid = target.dataset.cid, pid = target.dataset.pid;
    const casetta = state.config[cat].find(function(c){ return c.id===cid; });
    const product = casetta.products.find(function(p){ return p.id===pid; });
    product.name = target.value.trim() || product.name;
    await saveConfig(state.config);
  }
  if(action === 'edit-product-cost'){
    const cat = target.dataset.cat, cid = target.dataset.cid, pid = target.dataset.pid;
    const casetta = state.config[cat].find(function(c){ return c.id===cid; });
    const product = casetta.products.find(function(p){ return p.id===pid; });
    const val = parseFloat(target.value);
    product.cost = isNaN(val) ? 0 : val;
    await saveConfig(state.config);
  }
  if(action === 'edit-product-coupons'){
    const cat = target.dataset.cat, cid = target.dataset.cid, pid = target.dataset.pid;
    const casetta = state.config[cat].find(function(c){ return c.id===cid; });
    const product = casetta.products.find(function(p){ return p.id===pid; });
    const val = parseInt(target.value, 10);
    product.coupons = isNaN(val) ? 0 : val;
    await saveConfig(state.config);
  }
}

/* =========================================================================
   DATI DI PROVA / RESET
   ========================================================================= */
const DEMO_NAMES = ['Marco','Giulia','Luca','Sara','Davide','Elena','Matteo','Francesca','Chiara','Andrea'];
function randInt(min, max){ return Math.floor(Math.random()*(max-min+1))+min; }
function pickRandom(arr){ return arr[randInt(0, arr.length-1)]; }

function couponsPerGlass(cost){
  // In media un calice costa circa 4 coupon; più la bottiglia è cara, più ne servono
  return Math.max(1, Math.round(cost / 2.7));
}
function couponsPerBottle(cost){
  return couponsPerGlass(cost) * 6; // una bottiglia = 6 calici
}

async function generateSimulation(){
  const simDays = ['w1v','w1s','w1d'];
  const casette = allCasette();

  // Se un prodotto non ha un costo impostato (o è 0), assegnane uno casuale sotto i 20€
  let costsChanged = false;
  casette.forEach(function(c){
    c.products.forEach(function(p){
      const cost = parseFloat(p.cost);
      if(!cost || cost <= 0){
        p.cost = Math.round((Math.random() * 18.5 + 1.5) * 100) / 100; // tra 1.50€ e 20.00€
        costsChanged = true;
      }
    });
  });
  if(costsChanged) await saveConfig(state.config);

  const newLoads = {};
  const newLoadsLog = [];
  const newLog = [];
  const newCoupons = {};
  const couponsNeeded = {}; // couponsNeeded[casettaId][dayId] = totale coupon "consumati" dalle vendite

  // 1) Carichi
  casette.forEach(function(c){
    newLoads[c.id] = {};
    couponsNeeded[c.id] = {};
    simDays.forEach(function(dayId){
      const win = dayWindow(DAYS.find(function(d){ return d.id===dayId; }));
      newLoads[c.id][dayId] = {};
      couponsNeeded[c.id][dayId] = 0;
      c.products.forEach(function(p){
        let qty = 0;
        if(dayId === 'w1v'){
          qty = randInt(18, 36);
        } else if(Math.random() < 0.35){
          qty = randInt(6, 14);
        }
        if(qty > 0){
          newLoads[c.id][dayId][p.id] = qty;
          newLoadsLog.push({
            id: 'demo-l-'+c.id+'-'+dayId+'-'+p.id,
            casettaId: c.id, casettaName: c.name, categoria: c.categoria,
            dayId: dayId, productId: p.id, productName: p.name, qty: qty,
            ts: win.start.getTime() + randInt(0, 3*3600*1000)
          });
        }
      });
    });
  });

  // 2) Vendite (bottiglie/fusti finiti) + accumulo coupon necessari per quelle vendite
  casette.forEach(function(c){
    simDays.forEach(function(dayId){
      const win = dayWindow(DAYS.find(function(d){ return d.id===dayId; }));
      c.products.forEach(function(p){
        const loadedSoFar = simDays.slice(0, simDays.indexOf(dayId)+1).reduce(function(sum, dd){
          return sum + ((newLoads[c.id][dd] && newLoads[c.id][dd][p.id]) || 0);
        }, 0);
        const alreadySold = newLog.filter(function(e){ return e.casettaId===c.id && e.productId===p.id; }).length;
        const available = loadedSoFar - alreadySold;
        if(available <= 0) return;
        const sellToday = randInt(0, Math.min(available, 10));
        for(let i=0; i<sellToday; i++){
          newLog.push({
            id: 'demo-e-'+c.id+'-'+p.id+'-'+dayId+'-'+i,
            categoria: c.categoria, casettaId: c.id, casettaName: c.name,
            productId: p.id, productName: p.name,
            person: pickRandom(DEMO_NAMES),
            ts: win.start.getTime() + randInt(0, (win.end.getTime()-win.start.getTime())-1000)
          });
        }
        if(sellToday > 0){
          couponsNeeded[c.id][dayId] += sellToday * couponsPerBottle(parseFloat(p.cost) || 0);
        }
      });
    });
  });

  // 3) Coupon raccolti: basati sui coupon "necessari" per le vendite di quella serata,
  //    con una piccola variazione realistica (chi paga in contanti, sconti, ecc.)
  casette.forEach(function(c){
    newCoupons[c.id] = {};
    simDays.forEach(function(dayId){
      const win = dayWindow(DAYS.find(function(d){ return d.id===dayId; }));
      const base = couponsNeeded[c.id][dayId];
      const count = base > 0 ? Math.max(0, Math.round(base * (0.85 + Math.random() * 0.3))) : 0;
      newCoupons[c.id][dayId] = {
        count: count,
        person: pickRandom(DEMO_NAMES),
        ts: win.start.getTime() + randInt(4,8)*3600*1000
      };
    });
  });

  state.loads = newLoads;
  state.loadsLog = newLoadsLog;
  state.log = newLog;
  state.coupons = newCoupons;
  await saveLoads(state.loads);
  await saveLoadsLog(state.loadsLog);
  await saveLog(state.log);
  await saveCoupons(state.coupons);
}

async function resetEventData(){
  state.loads = {};
  state.loadsLog = [];
  state.log = [];
  state.coupons = {};
  await saveLoads(state.loads);
  await saveLoadsLog(state.loadsLog);
  await saveLog(state.log);
  await saveCoupons(state.coupons);
}

app.addEventListener('click', function(e){
  const target = e.target.closest('[data-action]');
  if(!target) return;
  handleAction(target.dataset.action, target);
});
app.addEventListener('change', function(e){
  handleChangeAction(e.target);
});
app.addEventListener('focusout', function(e){
  const target = e.target;
  if(target.dataset && (target.dataset.action === 'edit-casetta-name' || target.dataset.action === 'edit-product-name' || target.dataset.action === 'edit-product-cost' || target.dataset.action === 'edit-product-coupons')){
    handleBlurEdit(target);
  }
});

/* =========================================================================
   AGGIORNAMENTO AUTOMATICO (polling)
   ========================================================================= */
const AUTO_REFRESH_MS = 12000;
// L'aggiornamento automatico è attivo solo durante l'evento vero, per non
// consumare risorse inutilmente negli altri giorni. Il pulsante 🔄 manuale
// funziona sempre, in qualsiasi momento (utile anche per i test).
const EVENT_WINDOWS = [
  { start: new Date(2026, 6, 24, 18, 0, 0), end: new Date(2026, 6, 27, 3, 0, 0) },  // Ven 24/07 18:00 -> Lun 27/07 03:00
  { start: new Date(2026, 6, 31, 18, 0, 0), end: new Date(2026, 7, 3, 3, 0, 0) }    // Ven 31/07 18:00 -> Lun 03/08 03:00
];
function isWithinEventWindow(){
  const now = Date.now();
  return EVENT_WINDOWS.some(function(w){ return now >= w.start.getTime() && now < w.end.getTime(); });
}
function autoRefreshTick(){
  if(isWithinEventWindow()) refreshSharedData(false);
}
// Schermate con campi non ancora salvati: qui l'aggiornamento automatico
// aggiorna i dati in background ma NON ridisegna lo schermo, per non
// interrompere chi sta scrivendo. Il pulsante 🔄 forza comunque l'aggiornamento.
const UNSAFE_AUTOREFRESH_SCREENS = ['casetta_login','gestore_login','casetta_category','casetta_select','gestore_carico','gestore_config'];

async function refreshSharedData(force){
  if(!storageConfigured()) return;
  try{
    // Mentre siamo nella schermata "Casette & Prodotti", i nomi si salvano già
    // immediatamente appena si esce dal campo: evitiamo di ri-scaricare il config
    // per non rischiare di sovrascrivere in schermo un salvataggio appena fatto
    // (che potrebbe non essere ancora arrivato al server).
    const onConfigScreen = state.screen === 'gestore_config';
    const cfg = onConfigScreen ? state.config : await getConfig();
    const ld = await getLoads();
    const ll = await getLoadsLog();
    const lg = await getLog();
    const cp = await getCoupons();
    state.config = cfg;
    state.loads = ld;
    state.loadsLog = ll;
    state.log = lg;
    state.coupons = cp;
    if(force || UNSAFE_AUTOREFRESH_SCREENS.indexOf(state.screen) === -1){
      render();
    }
  }catch(e){ console.error('refresh error', e); }
}

/* =========================================================================
   INIT
   ========================================================================= */
async function init(){
  if(!storageConfigured()){
    render();
    return;
  }
  state.config = await getConfig();
  state.loads = await getLoads();
  state.loadsLog = await getLoadsLog();
  state.log = await getLog();
  state.coupons = await getCoupons();

  const session = getLocalSession();
  if(session){
    const ageMs = Date.now() - session.loginTs;
    const stillValid = ageMs < SESSION_HOURS * 60 * 60 * 1000;
    const casettaExists = findCasetta(session.categoria, session.casettaId);
    if(stillValid && casettaExists){
      state.casettaSession = session;
      state.screen = 'casetta_view';
      render();
      setInterval(autoRefreshTick, AUTO_REFRESH_MS);
      return;
    } else {
      clearLocalSession();
    }
  }
  state.screen = 'home';
  render();
  setInterval(autoRefreshTick, AUTO_REFRESH_MS);
}

init();
